<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Offline · Browns Perso</title>
<style>
  :root { --brand:#cc4903; --brand2:#fb7115; --cream:#f8f1e7; --ink:#2f2c29; --soft:#6f645b; --line:#e7dac9; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 15% -10%, rgba(251,113,21,.18), transparent 55%),
      radial-gradient(100% 80% at 110% 10%, rgba(204,73,3,.14), transparent 52%),
      var(--cream);
    display:flex; align-items:center; justify-content:center; padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .card {
    max-width:400px; width:100%; text-align:center;
    background:rgba(255,250,243,.8); border:1px solid rgba(255,255,255,.7);
    border-radius:26px; padding:34px 26px;
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset, 0 24px 50px -30px rgba(47,44,41,.45);
    backdrop-filter:blur(10px);
  }
  .logo {
    width:64px; height:64px; border-radius:20px; margin:0 auto 20px; display:grid; place-items:center;
    color:#fff; font-weight:800; font-size:2rem;
    background:linear-gradient(150deg,var(--brand2),var(--brand));
    box-shadow:0 12px 26px -12px rgba(204,73,3,.8), 0 1px 0 rgba(255,255,255,.4) inset;
  }
  h1 { font-size:1.35rem; margin:0 0 8px; letter-spacing:-.01em; }
  p { color:var(--soft); font-size:.95rem; line-height:1.55; margin:0 0 22px; }
  button {
    font:inherit; font-weight:700; color:#fff; border:0; cursor:pointer;
    background:linear-gradient(180deg,var(--brand2),var(--brand));
    padding:13px 22px; border-radius:14px; width:100%;
    box-shadow:0 12px 24px -12px rgba(204,73,3,.8);
  }
  button:active { transform:translateY(1px); }
  .hint { margin-top:14px; font-size:.78rem; color:var(--soft); }
  @media (prefers-color-scheme: dark) {
    :root { --cream:#191310; --ink:#f4e9dd; --soft:#c3b3a4; }
    .card { background:rgba(38,29,22,.7); border-color:rgba(255,255,255,.08); }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">B</div>
    <h1>Keine Internetverbindung</h1>
    <p>Browns Perso ist offline. Sobald du wieder Empfang oder WLAN hast, lädt die App automatisch weiter.</p>
    <button onclick="location.reload()">Erneut versuchen</button>
    <div class="hint">Stempeln, Schichten &amp; Chat brauchen eine aktive Verbindung.</div>
  </div>
  <script>
    // Automatisch neu laden, sobald die Verbindung zurück ist.
    window.addEventListener("online", function () { location.reload(); });
  </script>
</body>
</html>
